<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My AWS App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #10b981;
      --error: #ef4444;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(124,58,237,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.8rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.8rem;
      margin-bottom: 1.2rem;
      animation: fadeUp 0.6s ease both;
      transition: border-color 0.3s, transform 0.2s;
    }

    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.2s; }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.05rem;
      font-weight: 500;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.4s;
    }

    .dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
    .dot.error { background: var(--error); }

    .meta { font-size: 0.82rem; color: var(--muted); margin-top: 0.5rem; }

    .input-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 180px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    button {
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.4rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.88; transform: scale(1.02); }
    button:active { transform: scale(0.98); }

    .response-box {
      margin-top: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      font-size: 0.9rem;
      color: var(--accent2);
      min-height: 48px;
      font-family: 'DM Mono', monospace;
      word-break: break-all;
      transition: border-color 0.3s;
    }

    .loader {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--muted);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
      animation: fadeUp 0.8s 0.3s ease both;
    }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(20px);  } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse    { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes spin     { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="badge">🚀 AWS EC2 · us-east-1</div>
      <h1>2-Tier Web App</h1>
      <p class="subtitle">Node.js Backend + Static Frontend · Port 3000</p>
    </header>

    <!-- Status Card -->
    <div class="card">
      <div class="card-title">Backend Status</div>
      <div class="status-row">
        <span class="dot" id="dot"></span>
        <span id="statusText">Checking connection...</span>
      </div>
      <div class="meta" id="statusMeta"></div>
    </div>

    <!-- Greet Card -->
    <div class="card">
      <div class="card-title">Test API — Greet Endpoint</div>
      <div class="input-row">
        <input type="text" id="nameInput" placeholder="Enter your name..." maxlength="40"/>
        <button onclick="greetUser()">Send →</button>
      </div>
      <div class="response-box" id="greetResponse">Response will appear here...</div>
    </div>

    <footer>Built with Node.js · Express · Hosted on EC2 · us-east-1</footer>
  </div>

  <script>
    async function checkStatus() {
      const dot = document.getElementById('dot');
      const txt = document.getElementById('statusText');
      const meta = document.getElementById('statusMeta');
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        dot.className = 'dot online';
        txt.textContent = data.message;
        meta.textContent = `Server: ${data.server}  ·  ${new Date(data.timestamp).toLocaleTimeString()}`;
      } catch {
        dot.className = 'dot error';
        txt.textContent = 'Backend unreachable';
        meta.textContent = 'Check if server is running on port 3000';
      }
    }

    async function greetUser() {
      const name = document.getElementById('nameInput').value.trim() || 'Stranger';
      const box = document.getElementById('greetResponse');
      box.innerHTML = '<span class="loader"></span> Calling API...';
      try {
        const res = await fetch(`/api/greet/${encodeURIComponent(name)}`);
        const data = await res.json();
        box.textContent = `${data.greeting}  —  ${data.from}`;
      } catch {
        box.textContent = '❌ API call failed. Is the backend running?';
      }
    }

    checkStatus();
    setInterval(checkStatus, 10000);
  </script>
</body>
</html>
